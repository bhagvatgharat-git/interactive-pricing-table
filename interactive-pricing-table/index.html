<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
<title>Pricing Table</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="pricing">
<h1>Our Pricing Plans</h1>

  <div class="pricing-container">

    <article class="card">
      <h2>Basic</h2>
      <p class="price">$10/month</p>
      <ul>
        <li>1 User</li>
        <li>5GB Storage</li>
        <li>Email Support</li>
      </ul>
      <button>Select Plan</button>
    </article>

    <article class="card popular">
      <h2>Standard</h2>
      <p class="price">$20/month</p>
      <ul>
        <li>5 Users</li>
        <li>50GB Storage</li>
        <li>Priority Support</li>
      </ul>
      <button>Select Plan</button>
    </article>

    <article class="card">
      <h2>Premium</h2>
      <p class="price">$50/month</p>
      <ul>
        <li>Unlimited Users</li>
        <li>500GB Storage</li>
        <li>24/7 Support</li>
      </ul>
      <button>Select Plan</button>
    </article>

  </div>
</section>

</body>
</html>
